# Single source of truth for deterministic workflow evals.
# Drives pytest parametrization and Promptfoo test generation.
# Covers all 10 failure types from the MAS Rules specification.

cases:
  # --- SOURCE-TO-TARGET MAPPING MISSING (manual mapping maintenance, no approval) ---

  - id: gl_source_mapping_missing_mapping_maintenance
    description: GL source-to-target mapping maintenance allowed — reprocessed
    document_id: DOC-1004
    approve: false
    expected:
      status: reprocessed
      failure_scenario: gl_source_mapping_missing
      reason_code: MP_GL_ACCOUNT_SOURCE_TO_TARGET_MAPPING_MISSING
      action: maintain_source_mapping
      requires_approval: false
      allowed: true
      reprocessed: true
    audit:
      must_include:
        - { actor: intake_agent, action: document_loaded }
        - { actor: diagnosis_agent, action: diagnosis_completed }
        - { actor: remediation_planner, action: plan_created }
        - { actor: governance_agent, action: policy_evaluated }
        - { actor: reprocessing_controller, action: reprocess_executed }
      must_exclude:
        - { actor: human_approver, action: approval_recorded }

  - id: cost_center_source_mapping_missing_mapping_maintenance
    description: Cost center source-to-target mapping maintenance allowed — reprocessed
    document_id: DOC-1002
    approve: false
    expected:
      status: reprocessed
      failure_scenario: cost_center_source_mapping_missing
      reason_code: MP_COST_CENTER_SOURCE_TO_TARGET_MAPPING_MISSING
      action: maintain_source_mapping
      requires_approval: false
      allowed: true
      reprocessed: true
    audit:
      must_include:
        - { actor: reprocessing_controller, action: reprocess_executed }
      must_exclude:
        - { actor: human_approver, action: approval_recorded }

  - id: profit_center_source_mapping_missing_mapping_maintenance
    description: Profit center source-to-target mapping maintenance allowed — reprocessed
    document_id: DOC-1007
    approve: false
    expected:
      status: reprocessed
      failure_scenario: profit_center_source_mapping_missing
      reason_code: MP_PROFIT_CENTER_SOURCE_TO_TARGET_MAPPING_MISSING
      action: maintain_source_mapping
      requires_approval: false
      allowed: true
      reprocessed: true
    audit:
      must_include:
        - { actor: reprocessing_controller, action: reprocess_executed }
      must_exclude:
        - { actor: human_approver, action: approval_recorded }

  # --- MASTER DATA MISSING (requires approval) ---

  - id: missing_gl_account_master_needs_approval
    description: GL account master data missing — blocked until approved
    document_id: DOC-1001
    approve: false
    expected:
      status: needs_approval
      failure_scenario: missing_gl_account_master
      reason_code: MD_GL_ACCOUNT_MASTER_DATA_MISSING
      action: create_target_master_data
      requires_approval: true
      allowed: false
      reprocessed: false
    audit:
      must_include:
        - { actor: governance_agent, action: policy_evaluated }
      must_exclude:
        - { actor: reprocessing_controller, action: reprocess_executed }

  - id: missing_gl_account_master_approved_reprocesses
    description: Approved GL account master data creation — reprocesses after approval
    document_id: DOC-1001
    approve: true
    expected:
      status: reprocessed
      failure_scenario: missing_gl_account_master
      reason_code: MD_GL_ACCOUNT_MASTER_DATA_MISSING
      action: create_target_master_data
      requires_approval: true
      allowed: true
      reprocessed: true
    audit:
      must_include:
        - { actor: human_approver, action: approval_recorded }
        - { actor: reprocessing_controller, action: reprocess_executed }

