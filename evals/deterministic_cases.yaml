  # --- POSTING PERIOD CLOSED (always blocked, external approval required) ---

  - id: closed_period_blocked
    description: Posting period closed — always blocked, requires external approval to reopen
    document_id: DOC-1006
    approve: false
    expected:
      status: blocked
      failure_scenario: closed_posting_period
      reason_code: DC_POSTING_PERIOD_CLOSED
      action: external_controller_action_required
      requires_approval: true
      allowed: false
      reprocessed: false
    audit:
      must_include:
        - { actor: governance_agent, action: policy_evaluated }
      must_exclude:
        - { actor: reprocessing_controller, action: reprocess_executed }
