# Golden expectations for model-graded agent_summary evals.
# Automation source of truth: this file (10 docs).
# Human labels for DOC-1001, DOC-1002, DOC-1006: AI Evals_SM5_v0.6.xlsx (Golden_Dataset tab).
# DOC-1003–1005 and DOC-1007–1010 were cloned from those three policy patterns and
# validated by the LLM judge. Sync Excel manually if you want full human parity.

cases:
  - id: summary-doc-1001
    description: DOC-1001 missing GL master data needs approval before reprocess
    document_id: DOC-1001
    approve: false
    golden:
      approval_required: true
      expected_status: needs_approval
      expected_reason_code: MD_GL_ACCOUNT_MASTER_DATA_MISSING
      expected_action: create_target_master_data
      required_follow_on: maintain_source_mapping
      root_cause_expected: >-
        GL master data is missing in the target system. Hence, the financial
        document could not be posted in the target system.
      must_mention:
        - GL account missing in target system
        - approval is required before re-processing
        - source to target mapping must be maintained before re-processing
      must_not_say:
        - re-process without approval
        - missing mapping is the root cause
      example_good_summary: >-
        Document posting failed because GL account master data is missing in the
        target system. The document has not been reprocessed yet and requires
        approval before target master data can be created. After approval is
        recorded, create the required GL account master data, maintain the
        source to target mapping with the newly created GL master data and then
        reprocess the document.

