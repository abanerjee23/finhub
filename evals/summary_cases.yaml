      expected_action: maintain_source_mapping
      required_follow_on: not applicable
      root_cause_expected: >-
        Missing source to target mapping for the concerned cost center resulted
        in document posting failure
      must_mention:
        - cost center source to target mapping is missing
        - maintain the mapping manually in the target mapping table
        - reprocess the document
        - no approval required
      must_not_say:
        - create cost center master data
        - re-processing requires approval
        - system automatically updated the mapping table
        - auto-remediated
      example_good_summary: >-
        Document posting failed because the cost center source-to-target mapping
        is missing. Maintain the missing mapping entry manually in the target
        mapping table, then reprocess the document. No approval is required.

