# Railway/Nixpacks: Python (uv) + Node 20 for frontend build.
# Do not call `uv sync` manually here — the python provider installs uv and syncs from uv.lock.

providers = ["python"]

[variables]
NIXPACKS_PYTHON_VERSION = "3.11"
NIXPACKS_PYTHON_PACKAGE_MANAGER = "uv"

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "npm --prefix frontend ci --include=optional"
]

[phases.build]
cmds = [
  "npm --prefix frontend run build"
]

[start]
cmd = "uv run cfin-api"
