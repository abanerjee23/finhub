# Legacy Nixpacks config (local reference). Railway production uses Dockerfile.

providers = ["python"]

[variables]
NIXPACKS_PYTHON_VERSION = "3.11"
NIXPACKS_PYTHON_PACKAGE_MANAGER = "uv"
# Railway sets NODE_ENV=production; ensure devDependencies (@types/*) install for the build.
NPM_CONFIG_PRODUCTION = "false"

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.build]
cmds = [
  "npm --prefix frontend ci --include=optional --include=dev",
  "npm --prefix frontend run build"
]

[start]
cmd = "uv run cfin-api"
